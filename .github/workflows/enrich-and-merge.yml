name: Merge to Main

on:
  push:
    branches: [dev]

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open PR and merge to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "$(git log -1 --pretty=%s)" \
            --body "$(git log -1 --pretty=%b)" \
            || echo "PR already open."

          gh pr merge dev --squash --delete-branch=false
